spring.application.name=jaringochi

# server
server.port=8080

# MySQL database
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/ssafy?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.name=ssafy
spring.datasource.password=ssafy

# MyBatis
mybatis.mapper-locations=classpath:mappers/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-aliases-package=com.bp.jaringochi.domain