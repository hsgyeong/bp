spring.application.name=jaringochi

# server
server.port=8080

# MySQL database
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/jaringochi?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=ssafy
spring.datasource.password=ssafy

# 따로 workbench를 켜지 않고도 spring boot가 자동으로 schema.sql과 data.sql을 실행하도록 함
spring.sql.init.mode=always


# MyBatis
mybatis.mapper-locations=classpath:mappers/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-aliases-package=com.bp.jaringochi.domain

# JWT
# secret : 토큰 위조 방지, 서버가 발급한 토큰인지 확인
jwt.secret=jaringochi-super-secret-key-for-jwt-authentication-2026 
jwt.expiration=3600000