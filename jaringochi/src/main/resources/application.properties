spring.application.name=jaringochi

# server
server.port=8080

# MySQL database
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/jaringochi?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=ssafy
spring.datasource.password=ssafy

# 따로 workbench를 켜지 않고도 spring boot가 자동으로 schema.sql과 data.sql을 실행하도록 함
spring.sql.init.mode=always


# MyBatis
mybatis.mapper-locations=classpath:mappers/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-aliases-package=com.bp.jaringochi.domain

# JWT
# secret : 토큰 위조 방지, 서버가 발급한 토큰인지 확인
jwt.secret=jaringochi-super-secret-key-for-jwt-authentication-2026 
# Access Token 만료 시간: 1시간
jwt.expiration=3600000
# Refresh Token 만료 시간: 14일
jwt.refresh-expiration=1209600000


# AI 관련 설정
spring.config.import=optional:file:.env[.properties]
# GMS (SSAFY AI 게이트웨이) — 개인 OpenAI 키 없이 GMS 키로 호출. 키는 .env 의 GMS_KEY (커밋 금지)
gms.base-url=${GMS_BASE:https://gms.ssafy.io/gmsapi}
gms.key=${GMS_KEY:}

# ChatClient(spring-ai-starter-model-openai)를 GMS 경유로 라우팅 → 레포트 생성·굴비 한마디 모두 GMS
# Spring AI 2.0은 공식 OpenAI Java SDK 기반이라 base-url에 /v1 까지 포함해야 함(SDK가 /chat/completions만 덧붙임)
spring.ai.openai.base-url=${gms.base-url}/api.openai.com/v1
spring.ai.openai.api-key=${gms.key}
spring.ai.openai.chat.options.model=gpt-5.4-mini
spring.ai.openai.chat.options.temperature=0.7

# (선택) Advisor 디버그 로그 — 호출 내용 확인
logging.level[org.springframework.ai.chat.client.advisor]=debug